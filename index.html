<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>單字賽車競賽</title>
<style>
  :root { --pink: #2f80ed; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  html, body {
    margin: 0; padding: 0; overflow: hidden; background: #111; height: 100%;
    width: 100%; position: fixed; overscroll-behavior: none;
    font-family: Arial, "Noto Sans TC", sans-serif; touch-action: none;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  .ui { position: fixed; inset: 0; pointer-events: none; color: white; }
  .topbar {
    position: absolute; left: 10px; right: 10px; top: 10px;
    display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px;
    font-size: 13px; font-weight: 700;
    text-shadow: 0 2px 5px rgba(0,0,0,.45);
  }
  .pill {
    background: rgba(0,0,0,.38); padding: 8px 10px; border-radius: 999px; backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,.12); text-align:center;
  }
  .wordBox {
    position: absolute; left: 50%; transform: translateX(-50%); top: 62px;
    background: rgba(255,255,255,.95); color: #111; border-radius: 18px; padding: 10px 16px;
    min-width: 230px; text-align: center; box-shadow: 0 6px 18px rgba(0,0,0,.25);
    display: none;
  }
  .wordBox .en { font-size: 24px; font-weight: 800; color: var(--pink); }
  .wordBox .hint { font-size: 12px; margin-top: 4px; opacity: .78; }
  .controls {
    display: none !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
  .pad {
    display: grid; grid-template-columns: 78px 78px 78px; grid-template-rows: 74px 74px;
    gap: 10px; align-items: center; justify-items: center;
  }
  button {
    width: 74px; height: 74px; border: none; border-radius: 50%;
    background: rgba(255,255,255,.16); color: white; font-size: 30px; font-weight: 800;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.12), 0 6px 18px rgba(0,0,0,.28);
    backdrop-filter: blur(5px); -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(.96); }
  .controls, .pad, .controls button {
    display: none !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
  #upBtn { grid-column: 2; grid-row: 1; }
  #leftBtn { grid-column: 1; grid-row: 2; }
  #downBtn { grid-column: 2; grid-row: 2; }
  #rightBtn { grid-column: 3; grid-row: 2; }
  .overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(rgba(20,20,20,.25), rgba(20,20,20,.75)); pointer-events: auto;
  }
  .card {
    width: min(92vw, 560px); background: rgba(255,255,255,.97); color: #1a1a1a; border-radius: 24px;
    padding: 24px; box-shadow: 0 18px 40px rgba(0,0,0,.35);
  }
  .card h1 { margin: 0 0 10px; font-size: 28px; color: var(--pink); }
  .card p { margin: 8px 0; line-height: 1.55; }
  .card .startBtn {
    width: 100%; height: auto; border-radius: 14px; padding: 14px; margin-top: 14px;
    background: var(--pink); color: white; font-size: 20px;
  }

  .quizCard {
    width: min(94vw, 620px);
    padding: 0;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.7);
    background: linear-gradient(145deg, #fff8ef 0%, #f9fbff 52%, #eef6ff 100%);
    box-shadow: 0 22px 52px rgba(0,0,0,.32);
  }
  .quizHero {
    position: relative;
    padding: 24px 26px 20px;
    color: #fff;
    background:
      radial-gradient(circle at 16% 18%, rgba(255,255,255,.28) 0 10%, transparent 11%),
      radial-gradient(circle at 84% 26%, rgba(255,255,255,.24) 0 9%, transparent 10%),
      linear-gradient(90deg, #2f80ed 0%, #56ccf2 46%, #f2994a 100%);
  }
  .quizHero::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,.0) 0 20%, rgba(255,255,255,.55) 20% 40%, rgba(255,255,255,0) 40% 60%, rgba(255,255,255,.4) 60% 80%, rgba(255,255,255,0) 80% 100%);
    opacity: .55;
  }
  .quizHero h1 {
    margin: 0;
    font-size: 31px;
    color: #fff;
    letter-spacing: 1px;
  }
  .quizHero .subtitle {
    margin-top: 8px;
    font-size: 14px;
    opacity: .95;
    line-height: 1.5;
  }
  .quizBody {
    padding: 22px 24px 24px;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.56) 0 14px, rgba(244,238,227,.68) 14px 28px),
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,251,255,.96));
  }
  .quizPromptPanel {
    background: rgba(255,255,255,.9);
    border: 1px solid rgba(67,105,160,.12);
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,.08);
  }
  .quizPromptLabel {
    font-size: 13px;
    font-weight: 700;
    color: #7a8598;
    letter-spacing: .6px;
    margin-bottom: 6px;
  }
  .quizQuestionWord {
    font-size: 30px;
    font-weight: 900;
    color: #2f80ed;
    margin-bottom: 8px;
  }
  .quizPromptText {
    font-size: 15px;
    line-height: 1.6;
    color: #364255;
  }
  .quizPaletteWrap {
    margin: 16px 0 10px;
  }
  .quizPaletteTitle {
    font-size: 13px;
    font-weight: 700;
    color: #7c8798;
    margin-bottom: 8px;
  }
  .quizPalette {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .quizSwatch {
    width: 74px;
    height: 22px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.72);
    box-shadow: inset 0 1px 2px rgba(255,255,255,.3), 0 4px 12px rgba(0,0,0,.08);
  }
  .quizSwatch.s1 { background: linear-gradient(135deg, #f7d7c4, #e89b7b); }
  .quizSwatch.s2 { background: linear-gradient(135deg, #faefc8, #f2c36b); }
  .quizSwatch.s3 { background: linear-gradient(135deg, #d4efe7, #67c2af); }
  .quizSwatch.s4 { background: linear-gradient(135deg, #d7e9ff, #70a9f6); }
  .quizOptions {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }
  @media (min-width: 520px) {
    .quizOptions {
      grid-template-columns: 1fr 1fr;
    }
  }
  .quizOpt {
    margin-top: 0 !important;
    border-radius: 18px !important;
    padding: 15px 16px !important;
    font-size: 19px !important;
    font-weight: 800;
    text-align: center;
    border: 1px solid rgba(255,255,255,.72);
    box-shadow: 0 10px 18px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.36);
  }
  .quizOpt.opt1 { background: linear-gradient(90deg, #2f80ed, #56ccf2) !important; }
  .quizOpt.opt2 { background: linear-gradient(90deg, #5bb98a, #2f9d74) !important; }
  .quizOpt.opt3 { background: linear-gradient(90deg, #f2a65a, #ee7f62) !important; }
  .quizFooterNote {
    margin-top: 14px;
    font-size: 12px;
    color: #748091;
    text-align: center;
    letter-spacing: .3px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui">
  <div class="topbar">
    <div class="pill" id="timer">下個漩渦：15</div>
    <div class="pill" id="speed">時速：100</div>
    <div class="pill" id="rank">目前名次：第6名</div>
    <div class="pill" id="remaining">終點剩餘：30000m</div>
  </div>
  <div class="wordBox">
    <div class="en" id="currentWord">burger</div>
    <div class="hint">每 15 秒前方才會出現漩渦，碰到才會進入答題</div>
  </div>
  <div class="controls">
    <div class="pad">
      <button id="upBtn" aria-label="加速"></button>
      <button id="leftBtn" aria-label="左移"></button>
      <button id="downBtn" aria-label="煞車"></button>
      <button id="rightBtn" aria-label="右移"></button>
    </div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1>單字賽車競賽</h1>
    <p>你是 foodpanda 機車送餐員，畫面會從南往北推進，並與前方五台車一起衝向 30000 公尺終點線。</p>
    <p>每隔 <strong>15 秒</strong>，前方盡頭會慢慢浮現一個飄浮在空中的漩渦答題入口。玩家必須真的碰觸漩渦才會進入答題。答對會加速，答錯會減速。</p>
    <p>手機可用四方向按鈕：左右調整方向、上催油門前進、下煞車減速。最後到達終點時，系統只結算玩家名次。</p>
    <button class="startBtn" id="startBtn">開始遊戲</button>
  </div>
</div>
<script>
(() => {

  // iOS Safari zoom guard: prevent pinch, gesture zoom, and rapid double-tap zoom during gameplay.
  document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let lastTouchEndForZoomGuard = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEndForZoomGuard <= 300) e.preventDefault();
    lastTouchEndForZoomGuard = now;
  }, { passive: false });
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const ui = {
    score: document.getElementById('score'),
    hp: document.getElementById('hp'),
    combo: document.getElementById('combo'),
    timer: document.getElementById('timer'),
    speed: document.getElementById('speed'),
    rank: document.getElementById('rank'),
    remaining: document.getElementById('remaining'),
    word: document.getElementById('currentWord'),
    overlay: document.getElementById('overlay'),
    startBtn: document.getElementById('startBtn'),
    leftBtn: document.getElementById('leftBtn'),
    rightBtn: document.getElementById('rightBtn'),
    upBtn: document.getElementById('upBtn'),
    downBtn: document.getElementById('downBtn'),
  };

  const vocab = [
    { en: "grand", zh: "盛大的" },
    { en: "sightseeing", zh: "觀光" },
    { en: "forum", zh: "廣場" },
    { en: "double decker tour bus", zh: "雙層巴士" },
    { en: "fountain", zh: "噴水池" },
    { en: "cinema", zh: "電影院" },
    { en: "subway station", zh: "地鐵站" },
    { en: "mall", zh: "購物中心" },
    { en: "huge", zh: "巨大的" },
    { en: "avenue", zh: "大道" },
    { en: "parade", zh: "遊行" },
    { en: "audio guide", zh: "語音導覽" },
    { en: "stage", zh: "階段" },
    { en: "The Arc de Triomphe", zh: "凱旋門" },
    { en: "reason", zh: "理由" },
    { en: "hill", zh: "山丘" },
    { en: "profile", zh: "人物簡介" },
    { en: "charm", zh: "魅力" },
    { en: "expert", zh: "專家" },
    { en: "masterpiece", zh: "傑作" }
  ];

  let vocabQueue = [];

  function refillVocabQueue() {
    vocabQueue = vocab.slice();
    for (let i = vocabQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [vocabQueue[i], vocabQueue[j]] = [vocabQueue[j], vocabQueue[i]];
    }
  }

  let W = 0, H = 0, last = 0;
  let gameOver = false;
  let score = 0, hp = 100, combo = 0;
  let baseSpeed = 1.9, speedMul = 1.0, worldSpeed = 0;
  let playerSpeedKmh = 100, currentSpeedKmh = 0, maxPlayerSpeedKmh = 999;
  let currentSet = null, delivery = null, quizActive = false, quizResumeCooldown = 0, savedThrottle = 0, savedCurrentSpeed = 0;
  let vortexTimer = 15;
  let trucks = [];
  let truckSpawnTimer = 0;
  let obstacles = [], particles = [], streetDeco = [], enemyCars = [];
  let obstacleTimer = 0, decoTimer = 0, trackDistance = 0;
  let playerProgress = 0, raceLength = 30000, raceFinished = false;
  let finishCount = 0, playerFinishPlace = null, bossActivated = false, finalDisplayedRank = null, liveRankCache = 6, nextEnemySpawnTimer = 0, nextEnemySpawnDelay = 0.8;
  const obstaclesEnabled = false; // hard-disabled
  const guaranteedNoRoadObstacles = true;
  let skylineRows = [[], [], []];
  let throttle = 0;
  const horizonYFactor = 0.16;
  const maxEnemyCars = 5;
  const maxTrucks = 0;
  const roadBottomHalf = 0.64;
  const roadTopHalf = 0.22;
  const lanes = [-1, 0, 1];
  const riderSideLimit = 1.18;
  const riderStep = 0.46;
  const buttonsHeld = { up:false, down:false };
  const curvePattern = [
    { len: 620, curve: 0.00 },
    { len: 280, curve: 0.00 },
    { len: 430, curve: 1.42 },
    { len: 220, curve: 0.10 },
    { len: 460, curve: -1.62 },
    { len: 260, curve: 0.00 },
    { len: 420, curve: 1.54 },
    { len: 220, curve: -0.08 },
    { len: 470, curve: -1.72 },
    { len: 320, curve: 0.00 },
  ];

  const rider = {
    lane: 0, targetLane: 0, x: 0, y: 0,
    depth: 0.80, targetDepth: 0.80,
    bob: 0, hitFlash: 0,
    steer: 0,
    turnDrift: 0
  };

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildSkyline();
  }
  const rand = (a,b)=>Math.random()*(b-a)+a;
  const irand = m=>Math.floor(Math.random()*m);
  const pick = arr=>arr[irand(arr.length)];
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp = (a,b,t)=>a+(b-a)*t;

  const curveCycleLength = curvePattern.reduce((a,s)=>a+s.len, 0);


  function branchOffsetAt(distance) {
    return 0;
  }

  function buildSkyline() {
    const defs = [
      { depth: 0.68, maxH: 52 },
      { depth: 0.86, maxH: 74 },
      { depth: 1.0, maxH: 96 }
    ];
    skylineRows = defs.map((def, rowIdx) => {
      const arr = [];
      let x = -60;
      let i = 0;
      while (x < W + 120) {
        const w = (42 + (i % 4) * 10 + Math.abs(Math.sin(i * 0.77 + rowIdx)) * 24) * def.depth;
        const h = (def.maxH * (0.5 + ((i * 11) % 7) / 10 + Math.abs(Math.cos(i * 0.43 + rowIdx)) * 0.22)) * def.depth;
        arr.push({ x, w, h });
        x += w + (10 + (i % 3) * 8);
        i++;
      }
      return arr;
    });
  }

  function getCurveState(distance) {
    let d = ((distance % curveCycleLength) + curveCycleLength) % curveCycleLength;
    let acc = 0;
    for (let i = 0; i < curvePattern.length; i++) {
      const seg = curvePattern[i];
      if (d <= acc + seg.len) {
        const localT = (d - acc) / seg.len;
        const prev = curvePattern[(i - 1 + curvePattern.length) % curvePattern.length].curve;
        const curr = seg.curve;
        const next = curvePattern[(i + 1) % curvePattern.length].curve;
        const smoothT = localT * localT * (3 - 2 * localT);
        const curve = lerp(lerp(prev, curr, smoothT), lerp(curr, next, smoothT), 0.22);
        const tangent = (next - prev) * 0.5;
        return { curve, tangent, localT, index: i };
      }
      acc += seg.len;
    }
    return { curve: 0, tangent: 0, localT: 0, index: 0 };
  }

  function roadCenterAt(y) {
    const t = clamp((y - H * horizonYFactor) / (H * 0.84), 0, 1);
    const depth = 1 - t;
    let center = W / 2;
    let accum = 0;
    const steps = 6;
    for (let i = 0; i < steps; i++) {
      const sampleT = i / (steps - 1);
      const lookAhead = depth * depth * (80 + sampleT * 620);
      const sampleDistance = trackDistance + lookAhead;
      const st = getCurveState(sampleDistance);
      const horizonGate = Math.pow(sampleT, 2.8);
      const weight = Math.pow(sampleT, 2.2) * (0.45 + depth * 1.15) * (0.35 + horizonGate * 1.65);
      accum += (st.curve * 1.02 + st.tangent * 0.1) * weight;
    }
    const drift = Math.sin(trackDistance * 0.0012 + depth * 4.6) * 0.003 * (0.16 + depth * 0.28);
    center += W * 0.34 * (accum / steps + drift);
    return center;
  }

  function roadEdgesAt(y) {
    const t = clamp((y - H * horizonYFactor) / (H * 0.84), 0, 1);
    const depth = 1 - t;
    const cx = roadCenterAt(y);
    const st = getCurveState(trackDistance + depth * 900);
    const curveStrength = Math.abs(st.curve) + Math.abs(st.tangent) * 0.32;
    const half = lerp(W * roadTopHalf, W * roadBottomHalf, t) * (1 + curveStrength * 0.06);
    const bottomCalm = 1 - Math.pow(clamp((t - 0.72) / 0.28, 0, 1), 1.35) * 0.72;
    const stability = (1 - Math.pow(t, 1.25) * 0.18) * bottomCalm;
    const bank = st.curve * lerp(0.6, 5.2, t) * stability;
    const pitchBase = Math.sin(trackDistance * 0.00072 + depth * 4.3) * lerp(0.08, 0.52, t) * (0.94 - t * 0.14);
    const pitch = pitchBase * bottomCalm;
    const shoulder = lerp(18, 96, t) * (1 + curveStrength * 0.04);
    return {
      left: cx - half + bank,
      right: cx + half + bank,
      t, bank, curveStrength, pitch, shoulder,
      center: cx,
      width: half * 2,
      camber: st.curve
    };
  }
  function laneX(lane, y) {
    const e = roadEdgesAt(y);
    const third = (e.right - e.left) / 3;
    return e.left + third * ((lane + 1) + 0.5);
  }

  const hillPattern = [
    { len: 1200, amp: 0.00 },
    { len: 900, amp: 0.85 },
    { len: 760, amp: 1.95 },
    { len: 700, amp: 0.20 },
    { len: 980, amp: -1.15 },
    { len: 820, amp: 1.70 },
    { len: 900, amp: -0.92 },
    { len: 1200, amp: 0.00 },
  ];
  const hillCycleLength = hillPattern.reduce((a, s) => a + s.len, 0);

  function hillAt(distance) {
    let d = ((distance % hillCycleLength) + hillCycleLength) % hillCycleLength;
    let acc = 0;
    for (let i = 0; i < hillPattern.length; i++) {
      const seg = hillPattern[i];
      if (d <= acc + seg.len) {
        const localT = (d - acc) / seg.len;
        const prev = hillPattern[(i - 1 + hillPattern.length) % hillPattern.length].amp;
        const curr = seg.amp;
        const next = hillPattern[(i + 1) % hillPattern.length].amp;
        const smoothT = localT * localT * (3 - 2 * localT);
        return lerp(lerp(prev, curr, smoothT), lerp(curr, next, smoothT), 0.18);
      }
      acc += seg.len;
    }
    return 0;
  }

  function projectedDistanceFromY(t) {
    return 320 + Math.pow(1 - t, 1.45) * 2600;
  }

  function hillLiftForT(t) {
    const horizonBias = clamp((0.92 - t) / 0.92, 0, 1);
    const fadeNearPlayer = Math.pow(horizonBias, 1.55);
    const farEmphasis = 0.28 + fadeNearPlayer * 1.42;
    const sampleDistance = trackDistance + projectedDistanceFromY(t);
    const hillWave = hillAt(sampleDistance);
    return hillWave * (8 + farEmphasis * 92);
  }

  function isCarCompetingAhead(car) {
    if (car.finished) return false;

    // Hidden boss still counts as ahead before activation.
    if (car.hiddenBoss && !bossActivated) return true;

    // Cars that have not appeared yet still count ahead, but they cannot cause
    // sudden rank gains because they stay ahead until they actually enter the race.
    if (!isCarUnlocked(car) || !car.hasEnteredRace) {
      if (typeof car.rankAhead !== 'boolean') car.rankAhead = true;
      return car.rankAhead;
    }

    const racePos = (typeof car.raceProgress === 'number') ? car.raceProgress : (car.progress || 0);

    // Sensitive but stable pass detection:
    // rank improves as soon as the player's rear clears the enemy front by 0.35m.
    // rank worsens only if the enemy rear clears the player's front by 0.9m.
    const PLAYER_HALF_LEN = 2.2;
    const ENEMY_HALF_LEN = 2.4;
    const PASS_CLEARANCE = 0.15;
    const REPASS_CLEARANCE = 0.9;

    const playerFront = playerProgress + PLAYER_HALF_LEN;
    const playerRear  = playerProgress - PLAYER_HALF_LEN;
    const enemyFront  = racePos + ENEMY_HALF_LEN;
    const enemyRear   = racePos - ENEMY_HALF_LEN;

    if (typeof car.rankAhead !== 'boolean') car.rankAhead = true;

    if (car.rankAhead) {
      if (playerRear >= enemyFront + PASS_CLEARANCE) {
        car.rankAhead = false;
      }
    } else {
      if (enemyRear >= playerFront + REPASS_CLEARANCE) {
        car.rankAhead = true;
      }
    }

    return car.rankAhead;
  }

  function getPlayerPlaceEstimate() {
    let ahead = 0;
    for (const car of enemyCars) {
      if (isCarCompetingAhead(car)) ahead += 1;
    }
    return ahead + 1;
  }

  function getImmediatePlayerRank() {
    let ahead = 0;
    for (const car of enemyCars) {
      if (isCarCompetingAhead(car)) ahead += 1;
    }
    return ahead + 1;
  }

  function getFinalPlayerRank() {
    if (!playerFinishPlace) return getImmediatePlayerRank();
    return finalDisplayedRank || getImmediatePlayerRank();
  }

  function isCarUnlocked(car) {
    if (car.hiddenBoss) {
      return bossActivated;
    }
    return (playerProgress >= (car.revealAt || 0)) || (currentSpeedKmh >= (car.revealSpeed || 0));
  }

  function getVisibleAheadCount() {
    let ahead = 0;
    for (const car of enemyCars) {
      if (car.hiddenBoss) continue;
      if (!car.hasEnteredRace) continue;
      const racePos = (typeof car.raceProgress === 'number') ? car.raceProgress : (car.progress || 0);
      if (!car.finished && racePos > playerProgress + 3) ahead += 1;
    }
    return ahead;
  }

  function maybeActivateBoss() {
    if (bossActivated) return;

    const enteredNonBoss = enemyCars.filter(c => !c.hiddenBoss && c.hasEnteredRace && !c.finished);
    const nonBossAhead = enteredNonBoss.filter(c => {
      const racePos = (typeof c.raceProgress === 'number') ? c.raceProgress : (c.progress || 0);
      return racePos > playerProgress + 3;
    });

    const allNonBossEntered = enemyCars.filter(c => !c.hiddenBoss).every(c => c.hasEnteredRace || c.finished);

    // Boss 310 appears only after all 4 normal rivals have had their turn
    // and the player has effectively reached 2nd place.
    if (allNonBossEntered && nonBossAhead.length === 0) {
      const boss = enemyCars.find(c => c.hiddenBoss);
      if (boss && !boss.finished) {
        bossActivated = true;
        boss.revealAt = 0;
        boss.revealSpeed = 0;
        boss.hasEnteredRace = true;
        boss.rankAhead = true;
        boss.raceProgress = Math.max((boss.raceProgress || boss.progress || 0), playerProgress + 240);
        boss.progress = boss.raceProgress;
        boss.lane = [-0.72, -0.28, 0.18, 0.62][Math.floor(Math.random() * 4)];
      }
    }
  }

  function ensureUpcomingEnemy(dt) {
    // Sequential rivals: 120 -> 180 -> 250 -> 295, then Boss 310.
    // As soon as the current rival is no longer ahead, the next one should appear soon.
    if (bossActivated) return;

    const nonBossCars = enemyCars
      .filter(c => !c.hiddenBoss && !c.finished)
      .sort((a, b) => a.absSpeed - b.absSpeed);

    const aheadEntered = nonBossCars.filter(c => {
      const racePos = (typeof c.raceProgress === 'number') ? c.raceProgress : (c.progress || 0);
      return c.hasEnteredRace && racePos > playerProgress + 3;
    });

    if (aheadEntered.length > 0) {
      nextEnemySpawnTimer = 0;
      return;
    }

    const nextCar = nonBossCars.find(c => !c.hasEnteredRace);
    if (!nextCar) return;

    nextEnemySpawnTimer += dt;

    // At higher speed, 250 / 295 should not stay missing for long.
    let spawnDelay = 0.75;
    if (currentSpeedKmh >= 250) spawnDelay = 0.45;
    else if (currentSpeedKmh >= 190) spawnDelay = 0.6;

    if (nextEnemySpawnTimer < spawnDelay) return;

    nextCar.revealAt = 0;
    nextCar.revealSpeed = 0;
    nextCar.hasEnteredRace = true;
    nextCar.rankAhead = true;

    const laneChoices = [-0.82, -0.46, -0.08, 0.32, 0.76];
    nextCar.lane = laneChoices[Math.floor(Math.random() * laneChoices.length)];

    const entryGap =
      nextCar.absSpeed >= 295 ? 150 :
      nextCar.absSpeed >= 250 ? 130 :
      nextCar.absSpeed >= 180 ? 118 : 100;

    nextCar.raceProgress = Math.max(
      (typeof nextCar.raceProgress === 'number' ? nextCar.raceProgress : nextCar.progress),
      playerProgress + entryGap
    );
    nextCar.progress = nextCar.raceProgress;

    nextEnemySpawnTimer = 0;
    nextEnemySpawnDelay = spawnDelay;
  }


  function roadSurfaceY(y, x) {
    const e = roadEdgesAt(y);
    const hillLift = hillLiftForT(e.t);
    const farPitch = e.pitch * lerp(0.12, 0.82, 1 - Math.pow(clamp((e.t - 0.08) / 0.92, 0, 1), 1.35));
    // Keep the road surface vertically stable across its width so lane markings
    // stay straight and do not warp during hills or strong curves.
    return y + farPitch + hillLift;
  }

  function sideGroundY(side, y) {
    const e = roadEdgesAt(y);
    const hillLift = hillLiftForT(e.t) * 1.03;
    const farPitch = e.pitch * lerp(0.2, 1.0, 1 - Math.pow(clamp((e.t - 0.08) / 0.92, 0, 1), 1.35));
    return y + farPitch + hillLift + (side < 0 ? -e.bank * 0.035 : e.bank * 0.035);
  }

  function cameraRoll() {
    const near = getCurveState(trackDistance + 130).curve;
    const mid = getCurveState(trackDistance + 420).curve;
    return clamp((near * 0.58 + mid * 0.28) * 0.055, -0.045, 0.045);
  }

  function cameraPan() {
    const near = getCurveState(trackDistance + 90).curve;
    const ahead = getCurveState(trackDistance + 320).curve;
    return clamp((near * 0.56 + ahead * 0.24) * W * 0.03, -W * 0.032, W * 0.032);
  }

  function update(dt) {
    if (gameOver) return;
    if (quizActive) {
      updateUI();
      return;
    }
    if (quizResumeCooldown > 0) {
      quizResumeCooldown = Math.max(0, quizResumeCooldown - dt);
      updateUI();
      return;
    }

    let collidedThisFrame = false;

    const accel = buttonsHeld.up ? 2.0 : 0;
    const brake = buttonsHeld.down ? 2.6 : 0;
    throttle += accel * dt;
    throttle -= brake * dt;
    if (!buttonsHeld.up && !buttonsHeld.down) {
      if (throttle > 0) throttle = Math.max(0, throttle - dt * 1.7);
      if (throttle < 0) throttle = Math.min(0, throttle + dt * 1.7);
    }
    throttle = clamp(throttle, -0.35, 1.0);

    rider.targetDepth = clamp(0.84 - Math.max(0, throttle) * 0.15 + Math.max(0, -throttle) * 0.05, 0.62, 0.88);
    rider.depth = lerp(rider.depth, rider.targetDepth, dt * 8);
    rider.y = H * rider.depth;
    const riderCurveNear = getCurveState(trackDistance + 110);
    const riderCurveAhead = getCurveState(trackDistance + 340);
    const turnIntent = clamp(riderCurveNear.curve * 1.18 + riderCurveAhead.curve * 0.72 + riderCurveNear.tangent * 0.34, -1.05, 1.05);
    rider.steer = lerp(rider.steer, turnIntent, dt * (4.8 + Math.max(0, throttle) * 1.8));
    rider.turnDrift = lerp(rider.turnDrift, rider.steer * (30 + Math.max(0, throttle) * 18), dt * 4.6);
    const riderRoad = roadEdgesAt(rider.y);
    const laneTargetX = riderRoad.center + rider.targetLane * riderRoad.width * 0.44;
    rider.x = lerp(rider.x || laneTargetX, laneTargetX + rider.turnDrift, dt * (7.2 + Math.max(0, throttle) * 1.7));
    const riderHalfMargin = Math.max(36, riderRoad.width * 0.055);
    rider.x = clamp(rider.x, riderRoad.left + riderHalfMargin, riderRoad.right - riderHalfMargin);
    rider.lane = lerp(rider.lane, rider.targetLane, dt * 7.5);
    rider.bob += dt * (7 + Math.abs(throttle) * 9 + currentSpeedKmh * 0.01);
    rider.hitFlash = Math.max(0, rider.hitFlash - dt);

    const desiredSpeedKmh = Math.max(0, playerSpeedKmh * Math.max(0, throttle));
    const speedResponse = buttonsHeld.up ? 3.8 : 2.4;
    currentSpeedKmh = lerp(currentSpeedKmh, desiredSpeedKmh, clamp(dt * speedResponse, 0, 1));
    if (!buttonsHeld.up && throttle <= 0.01) currentSpeedKmh = Math.max(0, currentSpeedKmh - dt * 95);

    worldSpeed = baseSpeed * currentSpeedKmh;
    trackDistance += worldSpeed * dt;

    obstacleTimer += dt;
    decoTimer += dt;
    const trafficFactor = clamp(trackDistance / 2600, 0, 1);
    const spawnGap = Math.max(.42, 1.3 - trafficFactor * 0.42 - score * .001);
    if (obstaclesEnabled && worldSpeed > 20 && trackDistance > 360 && obstacleTimer > spawnGap) {
      obstacleTimer = 0;
      spawnObstacle();
      if (trafficFactor > 0.7 && Math.random() < 0.12 + trafficFactor * 0.12) spawnObstacle();
    }
    const decoGap = lerp(1.35, 0.58, trafficFactor);
    if (worldSpeed > 12 && trackDistance > 180 && decoTimer > decoGap) {
      decoTimer = 0;
      spawnStreetDeco();
      if (trafficFactor > 0.72 && Math.random() < 0.1) spawnStreetDeco();
    }

    obstacles = []; // guarantee no road obstacles remain or render


    for (const s of streetDeco) s.y += worldSpeed * dt * 0.92;
    streetDeco = streetDeco.filter(s => s.y < H + 180 && s.y > -240);

    truckSpawnTimer += dt;
    trucks = [];

    // Race progress: fixed route to the finish line.
    playerProgress += (currentSpeedKmh / 3.6) * dt;
    maybeActivateBoss();
    ensureUpcomingEnemy(dt);

    const visibleAhead = enemyCars
      .filter(c => {
        const activeCar = !(c.hiddenBoss && !bossActivated);
        const unlockedByDistance = playerProgress >= (c.revealAt || 0);
        const unlockedBySpeed = currentSpeedKmh >= (c.revealSpeed || 0);
        const unlocked = activeCar && (unlockedByDistance || unlockedBySpeed);
        return unlocked && !c.finished && c.raceProgress >= playerProgress - 120;
      })
      .sort((a, b) => a.raceProgress - b.raceProgress)
      .slice(0, maxEnemyCars)
      .map(c => c.id);

    for (const car of enemyCars) {
      const activeCar = !(car.hiddenBoss && !bossActivated);
      const unlockedByDistance = playerProgress >= (car.revealAt || 0);
      const unlockedBySpeed = currentSpeedKmh >= (car.revealSpeed || 0);
      const unlocked = activeCar && (unlockedByDistance || unlockedBySpeed);

      if (!car.finished) {
        const justUnlockedRegular = !car.hiddenBoss && isCarUnlocked(car) && !car.hasEnteredRace;
        if (justUnlockedRegular) {
          const entryGap = car.absSpeed >= 295 ? 140 : (car.absSpeed >= 250 ? 120 : 95);
          car.raceProgress = Math.max((typeof car.raceProgress === 'number' ? car.raceProgress : car.progress), playerProgress + entryGap);
          car.progress = car.raceProgress;
          car.rankAhead = true;
          car.hasEnteredRace = true;
        }

        if (!(car.hiddenBoss && !bossActivated) && isCarUnlocked(car)) {
          car.raceProgress = (typeof car.raceProgress === 'number' ? car.raceProgress : car.progress) + (car.absSpeed / 3.6) * dt;
        } else {
          car.raceProgress = (typeof car.raceProgress === 'number' ? car.raceProgress : car.progress);
        }

        // Start display progress from actual race progress, then apply only a light,
        // natural catch-up assist when the player is genuinely faster than this enemy.
        car.progress = car.raceProgress;
        let rawDelta = car.raceProgress - playerProgress;
        const speedAdvantage = currentSpeedKmh - car.absSpeed;

        // Strong overtake rule requested by the user:
        // if the player is more than 10 km/h faster than the enemy ahead,
        // the player must be able to pass it.
        if (unlocked && speedAdvantage > 10 && rawDelta > 0 && rawDelta < 420) {
          const overtakeMargin = speedAdvantage - 10;

          // Guarantee a decisive catch-up once the player has the required speed edge.
          // This keeps the enemy's preset speed, but forces the gap to close reliably.
          const guaranteedClose = ((overtakeMargin / 3.6) * dt * 4.2) + (rawDelta * 0.22);

          // When already close, finish the pass firmly instead of leaving the car stuck ahead.
          const finishingBoost = rawDelta < 90 ? (0.9 + overtakeMargin * 0.03) : 0;
          const assist = Math.min(rawDelta * 0.72, guaranteedClose + finishingBoost);

          // Allow the enemy to be pulled fully behind once the player has the speed edge.
          car.raceProgress = car.raceProgress - assist;
          car.progress = car.raceProgress;
          rawDelta = car.raceProgress - playerProgress;
        }

        // Keep boss display aligned with actual race progress so
        // if it still looks ahead, it is actually ahead in the race too.
        if (car.hiddenBoss && unlocked) {
          car.progress = car.raceProgress;
          rawDelta = car.raceProgress - playerProgress;
        }

        if (car.raceProgress >= raceLength) {
          car.raceProgress = raceLength;
          car.progress = Math.min(car.progress, raceLength);
          car.finished = true;
          if (!car.finishPlace) {
            finishCount += 1;
            car.finishPlace = finishCount;
          }
        }
      }

      const delta = car.raceProgress - playerProgress;
      const speedAdvantage = currentSpeedKmh - car.absSpeed;
      const catchAssistMeters = 0;
      const displayDelta = delta;
      car.rankProgress = car.raceProgress;
      const showAhead = unlocked && visibleAhead.includes(car.id);

      if (car.finished) {
        car.y = H * horizonYFactor - 90;
      } else if (!unlocked) {
        car.y = H * horizonYFactor - 120;
      } else if (delta >= 0 && !showAhead) {
        car.y = H * horizonYFactor + 34;
      } else if (displayDelta > 0) {
        const tAhead = clamp(displayDelta / 520, 0, 1);
        car.y = lerp(rider.y - 104, H * horizonYFactor + 10, tAhead);
      } else {
        const behind = clamp((-displayDelta) / 145, 0, 1);
        car.y = lerp(rider.y + 44, H + 78, behind);
      }

      const cx = laneX(car.lane, clamp(car.y, H * horizonYFactor + 8, H + 120));
      const ce = roadEdgesAt(car.y);
      if (unlocked && ce.t > 0.06 && ce.t < 1.05) {
        const cy = roadSurfaceY(car.y, cx);
        const scale = lerp(0.26, 1.04, ce.t);
        const halfW = 26 * scale;
        const halfH = 18 * scale;
        const collide = Math.abs(rider.x - cx) < halfW + 22 && Math.abs((rider.y - 10) - cy) < halfH + 18 && delta > -16 && delta < 48;
        if (collide && !collidedThisFrame && !car.finished) {
          collidedThisFrame = true;
          spawnSparks((rider.x + cx) * 0.5, (rider.y + cy) * 0.5 - 6);
          currentSpeedKmh = Math.max(0, currentSpeedKmh - 28);
          rider.hitFlash = 0.18;
        }
      }
    }

    // Update live rank only after all race positions have been advanced this frame,
    // using the same front/rear-distance rank logic.
    liveRankCache = clamp(getImmediatePlayerRank(), 1, maxEnemyCars + 1);

    updateUI();

    if (!raceFinished && playerProgress >= raceLength) {
      playerProgress = raceLength;

      // Determine final rank from actual race positions / finish state at the finish moment.
      let aheadAtFinish = 0;
      for (const car of enemyCars) {
        const racePos = (typeof car.raceProgress === 'number') ? car.raceProgress : (car.progress || 0);
        if (car.finished && (car.finishPlace || 99) < (playerFinishPlace || 99)) aheadAtFinish += 1;
        else if (!car.finished && racePos > playerProgress + 0.1) aheadAtFinish += 1;
      }
      const crossingRank = clamp(aheadAtFinish + 1, 1, maxEnemyCars + 1);

      raceFinished = true;
      if (!playerFinishPlace) {
        finalDisplayedRank = crossingRank;
        finishCount += 1;
        playerFinishPlace = finishCount;
      }
      const finalRank = finalDisplayedRank || crossingRank;
      return endGame(`抵達終點！第${finalRank}名`, `玩家名次：<strong>第${finalRank}名</strong>`, `路線長度：<strong>${raceLength}m</strong>　最終時速能力：<strong>${Math.round(playerSpeedKmh)}</strong> km/h`);
    }

    if (!delivery) {
      vortexTimer = Math.max(0, vortexTimer - dt);
      if (vortexTimer <= 0) {
        makeDelivery();
      }
    }

    if (delivery) {
      delivery.y += worldSpeed * dt * 0.26;
      const zoneY = delivery.y;
      const zoneE = roadEdgesAt(zoneY);
      if (!delivery.answered && !delivery.active && zoneE.t >= 0.02 && zoneE.t <= 1.08) {
        const zoneX = zoneE.center + zoneE.width * delivery.xOffsetNorm;
        const zoneBaseY = roadSurfaceY(zoneY, zoneX);
        const floatLift = lerp(118, 28, clamp(zoneE.t, 0, 1));
        const zoneVisualY = zoneBaseY - floatLift;
        // Reliable touch-overlap rule:
        // The quiz opens when the visible vortex overlaps/touches the visible car area.
        // It uses screen-space bounds, so it will not trigger from far away,
        // but it will trigger once the car actually reaches the vortex.
        const carScreenY = roadSurfaceY(rider.y, rider.x);
        const carScale = lerp(0.64, 0.84, clamp((rider.depth - 0.60) / 0.28, 0, 1));

        const carLeft = rider.x - 62 * carScale;
        const carRight = rider.x + 62 * carScale;
        const carTop = carScreenY - 42 * carScale;
        const carBottom = carScreenY + 32 * carScale;

        const vortexScale = lerp(0.12, 0.74, zoneE.t);
        const rawVortexRx = Math.max(28, zoneE.width * 0.08);
        const rawVortexRy = Math.max(14, rawVortexRx * 0.50);

        // Include the visible aura edge, not only the dark center.
        const vortexLeft = zoneX - rawVortexRx * vortexScale * 1.75;
        const vortexRight = zoneX + rawVortexRx * vortexScale * 1.75;
        const vortexTop = zoneVisualY - rawVortexRy * vortexScale * 1.85;
        const vortexBottom = zoneVisualY + rawVortexRy * vortexScale * 1.85;

        const touchPadding = 10;
        const hit =
          carRight + touchPadding >= vortexLeft &&
          carLeft - touchPadding <= vortexRight &&
          carBottom + touchPadding >= vortexTop &&
          carTop - touchPadding <= vortexBottom;
        if (hit) {
          openQuiz();
        }
      }
      if (delivery.y > H + 260 || delivery.answered) {
        delivery = null;
        vortexTimer = 15;
      } else if (delivery.y < H * horizonYFactor - 150) {
        delivery.y = H * horizonYFactor - 150;
      }
      if (delivery) {
        delivery.xOffsetNorm = clamp(delivery.xOffsetNorm, -0.24, 0.24);
      }
    }

    for (const p of particles) {
      p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 430 * dt;
    }
    particles = particles.filter(p => p.life > 0);

  }


  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#6fa7ff');
    sky.addColorStop(.42, '#9fd0ff');
    sky.addColorStop(.74, '#dff2ff');
    sky.addColorStop(1, '#f5fbff');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    const horizon = H * horizonYFactor;
    const roadHorizonCenter = roadCenterAt(horizon + 2);

    for (let i = 0; i < 9; i++) {
      const cx = (i / 8) * W + Math.sin(trackDistance * 0.00012 + i) * 12;
      const cy = horizon - 40 + (i % 3) * 24;
      const cloud = ctx.createRadialGradient(cx, cy, 8, cx, cy, 70);
      cloud.addColorStop(0, 'rgba(255,255,255,0.46)');
      cloud.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = cloud;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 80, 24, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSkylineRow(row, baseY, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      for (const b of row) {
        const grad = ctx.createLinearGradient(b.x, baseY - b.h, b.x + b.w, baseY);
        grad.addColorStop(0, color);
        grad.addColorStop(1, 'rgba(255,255,255,0.24)');
        ctx.fillStyle = grad;
        ctx.fillRect(b.x, baseY - b.h, b.w, b.h);
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        ctx.fillRect(b.x + b.w * 0.16, baseY - b.h + 8, Math.max(4, b.w * 0.12), Math.max(10, b.h - 16));
      }
      ctx.restore();
    }

    drawSkylineRow(skylineRows[0], horizon + 8, '#8aa5bf', 0.18);
    drawSkylineRow(skylineRows[1], horizon + 18, '#6986a2', 0.26);
    drawSkylineRow(skylineRows[2], horizon + 30, '#486683', 0.34);

    const haze = ctx.createLinearGradient(0, horizon - 10, 0, horizon + 90);
    haze.addColorStop(0, 'rgba(255,255,255,0.0)');
    haze.addColorStop(1, 'rgba(255,255,255,0.02)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, horizon - 10, W, 100);
  }


  function drawRoad() {
    const topY = H * horizonYFactor;

    const voidGrad = ctx.createLinearGradient(0, topY, 0, H);
    voidGrad.addColorStop(0, '#dcecff');
    voidGrad.addColorStop(.52, '#bddaf4');
    voidGrad.addColorStop(1, '#90b6d8');
    ctx.fillStyle = voidGrad;
    ctx.fillRect(0, topY, W, H - topY);


    const roadRenderStep = Math.max(3, Math.floor(H / 260));
    for (let y = topY; y < H; y += roadRenderStep) {
      const y2 = Math.min(H, y + roadRenderStep);
      const e1 = roadEdgesAt(y);
      const e2 = roadEdgesAt(y2);
      const surfL1 = roadSurfaceY(y, e1.left);
      const surfL2 = roadSurfaceY(y2, e2.left);
      const surfR1 = roadSurfaceY(y, e1.right);
      const surfR2 = roadSurfaceY(y2, e2.right);
      const sidePad1 = e1.shoulder * 0.76;
      const sidePad2 = e2.shoulder * 0.76;

      const platformGrad = ctx.createLinearGradient(0, y, 0, y2 + 34);
      platformGrad.addColorStop(0, '#e2e7ec');
      platformGrad.addColorStop(.48, '#bcc6d0');
      platformGrad.addColorStop(1, '#6c7884');
      ctx.fillStyle = platformGrad;
      ctx.beginPath();
      ctx.moveTo(e1.left - sidePad1, surfL1 + 1);
      ctx.lineTo(e1.right + sidePad1, surfR1 + 1);
      ctx.lineTo(e2.right + sidePad2, surfR2 + 22);
      ctx.lineTo(e2.left - sidePad2, surfL2 + 22);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(48,58,69,0.58)';
      ctx.beginPath();
      ctx.moveTo(e1.left - sidePad1, surfL1 + 22);
      ctx.lineTo(e1.left - sidePad1 * 0.38, surfL1 + 54);
      ctx.lineTo(e2.left - sidePad2 * 0.38, surfL2 + 60);
      ctx.lineTo(e2.left - sidePad2, surfL2 + 22);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(e1.right + sidePad1, surfR1 + 22);
      ctx.lineTo(e1.right + sidePad1 * 0.38, surfR1 + 54);
      ctx.lineTo(e2.right + sidePad2 * 0.38, surfR2 + 60);
      ctx.lineTo(e2.right + sidePad2, surfR2 + 22);
      ctx.closePath();
      ctx.fill();

      const supportAlpha = clamp((e1.t - 0.38) / 0.42, 0, 0.15);
      if (supportAlpha > 0.01 && ((Math.floor((trackDistance + y * 2.2) / 150) % 5) === 0)) {
        const mid = (e1.left + e1.right) * 0.5;
        const legW = lerp(8, 22, e1.t);
        const legH = lerp(46, 160, e1.t);
        ctx.fillStyle = `rgba(70,84,96,${supportAlpha})`;
        ctx.beginPath();
        ctx.moveTo(mid - legW, (surfL1 + surfR1) * 0.5 + 22);
        ctx.lineTo(mid + legW, (surfL1 + surfR1) * 0.5 + 22);
        ctx.lineTo(mid + legW * 0.56, (surfL1 + surfR1) * 0.5 + legH);
        ctx.lineTo(mid - legW * 0.56, (surfL1 + surfR1) * 0.5 + legH);
        ctx.closePath();
        ctx.fill();
      }

      const shoulderGrad = ctx.createLinearGradient(0, y, 0, y2);
      shoulderGrad.addColorStop(0, '#f7fafc');
      shoulderGrad.addColorStop(0.55, '#e2e7ec');
      shoulderGrad.addColorStop(1, '#bcc6d0');
      ctx.fillStyle = shoulderGrad;
      ctx.beginPath();
      ctx.moveTo(e1.left - 10, surfL1 + 1);
      ctx.lineTo(e1.left + 13, surfL1 - 1);
      ctx.lineTo(e2.left + 13, surfL2 - 1);
      ctx.lineTo(e2.left - 10, surfL2 + 1);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(e1.right - 13, surfR1 - 1);
      ctx.lineTo(e1.right + 10, surfR1 + 1);
      ctx.lineTo(e2.right + 10, surfR2 + 1);
      ctx.lineTo(e2.right - 13, surfR2 - 1);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#c8d0d7';
      ctx.beginPath();
      ctx.moveTo(e1.left - 5, surfL1 + 1);
      ctx.lineTo(e1.left, surfL1);
      ctx.lineTo(e2.left, surfL2);
      ctx.lineTo(e2.left - 5, surfL2 + 1);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(e1.right, surfR1);
      ctx.lineTo(e1.right + 5, surfR1 + 1);
      ctx.lineTo(e2.right + 5, surfR2 + 1);
      ctx.lineTo(e2.right, surfR2);
      ctx.closePath();
      ctx.fill();

      const asphalt = ctx.createLinearGradient(0, surfL1, 0, surfL2 + 2);
      asphalt.addColorStop(0, '#2f363d');
      asphalt.addColorStop(0.35, '#2b3138');
      asphalt.addColorStop(0.7, '#262c33');
      asphalt.addColorStop(1, '#21262d');
      ctx.fillStyle = asphalt;
      ctx.beginPath();
      ctx.moveTo(e1.left, surfL1);
      ctx.lineTo(e1.right, surfR1);
      ctx.lineTo(e2.right, surfR2);
      ctx.lineTo(e2.left, surfL2);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.012)';
      ctx.beginPath();
      ctx.moveTo(e1.left + 10, surfL1);
      ctx.lineTo(e1.right - 10, surfR1);
      ctx.lineTo(e2.right - 10, surfR2);
      ctx.lineTo(e2.left + 10, surfL2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 6.8;
    for (let y = topY; y < H; y += 8) {
      const e1 = roadEdgesAt(y), e2 = roadEdgesAt(Math.min(H, y + 8));
      ctx.beginPath();
      ctx.moveTo(e1.left + 5, roadSurfaceY(y, e1.left + 5));
      ctx.lineTo(e2.left + 5, roadSurfaceY(y + 8, e2.left + 5));
      ctx.moveTo(e1.right - 5, roadSurfaceY(y, e1.right - 5));
      ctx.lineTo(e2.right - 5, roadSurfaceY(y + 8, e2.right - 5));
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(255,255,255,0.995)';
    ctx.lineWidth = 4.2;
    const laneOffsets = [-0.33, 0.33];
    for (const off of laneOffsets) {
      ctx.setLineDash([22, 12]);
      ctx.beginPath();
      for (let y = topY + 8; y < H; y += 9) {
        const e = roadEdgesAt(y);
        const px = e.center + e.width * off;
        const py = roadSurfaceY(y, px);
        if (y === topY + 8) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);

    ctx.strokeStyle = '#f2c11d';
    ctx.lineWidth = 6.8;
    for (const off of [-0.016, 0.016]) {
      ctx.beginPath();
      for (let y = topY + 8; y < H; y += 7) {
        const e = roadEdgesAt(y);
        const px = e.center + e.width * off;
        const py = roadSurfaceY(y, px) - 0.2;
        if (y === topY + 8) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(18,22,26,0.22)';
    ctx.lineWidth = 1.6;
    for (let y = topY; y < H; y += 11) {
      const e1 = roadEdgesAt(y), e2 = roadEdgesAt(Math.min(H, y + 11));
      ctx.beginPath();
      ctx.moveTo(e1.left + 10, roadSurfaceY(y, e1.left + 10));
      ctx.lineTo(e2.left + 10, roadSurfaceY(y + 11, e2.left + 10));
      ctx.moveTo(e1.right - 10, roadSurfaceY(y, e1.right - 10));
      ctx.lineTo(e2.right - 10, roadSurfaceY(y + 11, e2.right - 10));
      ctx.stroke();
    }
  }


  function drawPineTree(x, y, scale, side) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#0d1710';
    ctx.fillRect(-5, -34, 10, 36);

    const layers = [
      { w: 54, h: 54, oy: -72, c: '#355d1e' },
      { w: 44, h: 42, oy: -54, c: '#2d5418' },
      { w: 34, h: 32, oy: -38, c: '#274b15' },
    ];
    for (const layer of layers) {
      const grad = ctx.createLinearGradient(-layer.w * 0.55, 0, layer.w * 0.55, 0);
      grad.addColorStop(0, '#436d22');
      grad.addColorStop(.55, layer.c);
      grad.addColorStop(1, '#1f3810');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, layer.oy - layer.h * 0.92);
      ctx.lineTo(-layer.w * 0.5, layer.oy);
      ctx.lineTo(layer.w * 0.5, layer.oy);
      ctx.closePath();
      ctx.fill();
    }

    ctx.globalAlpha = .14;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(10 * -side, 6, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

    ctx.save();

    ctx.scale(scale, scale);

    const railGrad = ctx.createLinearGradient(-30 * side, -18, 28 * side, -6);
    railGrad.addColorStop(0, '#8c949a');

    railGrad.addColorStop(1, '#7f878d');

  function sideX(side, y) {
    const e = roadEdgesAt(y);
    return side < 0 ? e.left - lerp(36, 140, e.t) : e.right + lerp(36, 140, e.t);
  }


  function drawStreetDeco(s) {
    const x = sideX(s.side, s.y);
    const e = roadEdgesAt(s.y);
    const scale = lerp(.25, 1.56, e.t);
    const fade = clamp((e.t - 0.34) / 0.28, 0, 1) * clamp((trackDistance - 120) / 900, 0, 1);
    if (fade <= 0.02) return;
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(x, sideGroundY(s.side, s.y));

    if (s.kind === 'tree') {
      ctx.scale(scale, scale);
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(0, 6, 22, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#6d7a86'; ctx.fillRect(-4, -24, 8, 30);
      const crown = ctx.createRadialGradient(-8, -30, 3, 0, -26, 28);
      crown.addColorStop(0, '#dff1ff');
      crown.addColorStop(1, '#9fcaef');
      ctx.fillStyle = crown;
      ctx.beginPath(); ctx.arc(0, -28, 24, 0, Math.PI * 2); ctx.fill();
    } else if (s.kind === 'lamp') {
      ctx.scale(scale, scale);
      ctx.strokeStyle = '#5b6670'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -38); ctx.lineTo(18 * s.side, -38); ctx.stroke();
      ctx.fillStyle = '#eef6ff'; ctx.fillRect(12 * s.side - 6, -42, 12, 8);
    } else if (s.kind === 'traffic') {
      ctx.scale(scale, scale);
      ctx.fillStyle = '#6a737b'; ctx.fillRect(-3, -36, 6, 42);
      ctx.fillStyle = '#2a2c2f'; ctx.fillRect(-12, -48, 24, 24);
      ctx.fillStyle = '#ff4f4f'; ctx.beginPath(); ctx.arc(0, -41, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffd84d'; ctx.beginPath(); ctx.arc(0, -34, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#53d768'; ctx.beginPath(); ctx.arc(0, -27, 4, 0, Math.PI * 2); ctx.fill();
    } else if (s.kind === 'sign') {
      ctx.scale(scale, scale);
      ctx.fillStyle = '#666'; ctx.fillRect(-3, -24, 6, 30);
      ctx.fillStyle = '#f2f2f2'; ctx.fillRect(-18, -38, 36, 18);
      ctx.strokeStyle = '#c8c8c8'; ctx.strokeRect(-18, -38, 36, 18);
      ctx.fillStyle = '#3f7fd8'; ctx.fillRect(-13, -33, 26, 8);
    } else {
      ctx.scale(scale, scale);
      const sideDir = s.side < 0 ? -1 : 1;
      ctx.fillStyle = 'rgba(0,0,0,0.14)';
      ctx.beginPath(); ctx.ellipse(0, 10, 34, 9, 0, 0, Math.PI * 2); ctx.fill();

      const wallGrad = ctx.createLinearGradient(-44 * sideDir, -58, 40 * sideDir, 0);
      wallGrad.addColorStop(0, '#eef4fa');
      wallGrad.addColorStop(.55, '#d7e0e8');
      wallGrad.addColorStop(1, '#a6b6c4');
      ctx.fillStyle = wallGrad;
      ctx.beginPath();
      ctx.moveTo(-40 * sideDir, -58);
      ctx.lineTo(40 * sideDir, -58);
      ctx.lineTo(54 * sideDir, 0);
      ctx.lineTo(-28 * sideDir, 0);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#728aa1';
      ctx.beginPath();
      ctx.moveTo(-40 * sideDir, -58);
      ctx.lineTo(40 * sideDir, -58);
      ctx.lineTo(22 * sideDir, -82);
      ctx.lineTo(-56 * sideDir, -82);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#8fd1ff';
      for (let ry = -48; ry <= -16; ry += 12) {
        ctx.fillRect(-28 * sideDir, ry, 12 * sideDir, 8);
        ctx.fillRect(-8 * sideDir, ry, 12 * sideDir, 8);
        ctx.fillRect(12 * sideDir, ry, 12 * sideDir, 8);
      }
      ctx.fillStyle = '#506270';
      ctx.fillRect(0 * sideDir, -14, 16 * sideDir, 14);
    }
    ctx.restore();
  }

  function drawObstacle(o) {
    const x = laneX(o.lane, o.y);
    const e = roadEdgesAt(o.y);
    const scale = lerp(.32, 1.28, e.t);
    const fade = clamp((e.t - 0.015) / 0.22, 0, 1);
    if (fade <= 0.02) return;
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(x, roadSurfaceY(o.y, x));
    ctx.scale(scale, scale);
    if (o.kind === 'cone') {
      ctx.fillStyle = '#ff7d24'; ctx.beginPath(); ctx.moveTo(0, -24); ctx.lineTo(-18, 14); ctx.lineTo(18, 14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillRect(-10, 0, 20, 5);

      ctx.fillStyle = '#57a5ff'; ctx.beginPath(); ctx.ellipse(0, 6, 24, 11, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#d2ebff'; ctx.lineWidth = 2; ctx.stroke();
    } else if (o.kind === 'box') {
      ctx.fillStyle = '#8b613d'; ctx.fillRect(-18, -16, 36, 30);
      ctx.strokeStyle = '#c59a72'; ctx.lineWidth = 2; ctx.strokeRect(-18, -16, 36, 30);
    } else if (o.kind === 'barrier') {
      ctx.fillStyle = '#f3f3f3'; ctx.fillRect(-28, -10, 56, 24);
      ctx.fillStyle = '#ff4b4b';
      ctx.fillRect(-24, -6, 14, 6); ctx.fillRect(-2, -6, 14, 6); ctx.fillRect(20, -6, 4, 6);
    } else {
      ctx.fillStyle = '#26344f'; ctx.fillRect(-28, -22, 56, 40);
      ctx.fillStyle = '#8ad4ff'; ctx.fillRect(-16, -16, 32, 12);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-18, 18, 8, 0, Math.PI*2); ctx.arc(18, 18, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd54f'; ctx.fillRect(-28, -6, 6, 6); ctx.fillRect(22, -6, 6, 6);
    }
    ctx.restore();

  function drawDelivery() {
    if (!delivery) return;
    const e0 = roadEdgesAt(delivery.y);
    const fade = clamp((e0.t - 0.015) / 0.18, 0, 1);
    if (fade <= 0.01 || delivery.answered) return;
    const x = e0.center + e0.width * delivery.xOffsetNorm;
    const baseY = roadSurfaceY(delivery.y, x);
    const floatLift = lerp(118, 28, clamp(e0.t, 0, 1));
    const visualY = baseY - floatLift;
    const scale = lerp(0.12, 0.74, e0.t);
    const pulse = 1;
    const spin = 0;
    const rx = Math.max(28, e0.width * 0.08);
    const ry = Math.max(14, rx * 0.50);

    ctx.save();
    ctx.globalAlpha = fade * 0.62;
    ctx.translate(x, baseY + 8);
    ctx.scale(scale * 1.0, scale * 0.36);
    const shadow = ctx.createRadialGradient(0, 0, 12, 0, 0, rx * 1.8);
    shadow.addColorStop(0, 'rgba(0,0,0,0.34)');
    shadow.addColorStop(0.55, 'rgba(0,0,0,0.16)');
    shadow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadow;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 1.18, ry * 0.82, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(x, visualY);
    ctx.scale(scale * pulse, scale * pulse);

    const mist = ctx.createRadialGradient(0, 0, rx * 0.18, 0, 0, rx * 2.25);
    mist.addColorStop(0, 'rgba(255,255,255,0.12)');
    mist.addColorStop(0.18, 'rgba(198,224,255,0.18)');
    mist.addColorStop(0.45, 'rgba(126,170,255,0.16)');
    mist.addColorStop(0.72, 'rgba(95,118,214,0.10)');
    mist.addColorStop(1, 'rgba(95,118,214,0)');
    ctx.fillStyle = mist;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 1.95, ry * 1.85, 0, 0, Math.PI * 2);
    ctx.fill();

    const aura = ctx.createRadialGradient(0, 0, 8, 0, 0, rx * 1.95);
    aura.addColorStop(0, 'rgba(12,12,22,0.98)');
    aura.addColorStop(0.34, 'rgba(18,16,34,0.95)');
    aura.addColorStop(0.58, 'rgba(84,132,255,0.44)');
    aura.addColorStop(0.82, 'rgba(126,88,232,0.22)');
    aura.addColorStop(1, 'rgba(126,88,232,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 1.50, ry * 1.46, 0, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.rotate(spin * (i % 2 === 0 ? 1 : -1) + i * 1.05);
      ctx.strokeStyle = i === 0 ? 'rgba(178,214,255,0.84)' : (i === 1 ? 'rgba(132,112,255,0.76)' : 'rgba(255,255,255,0.42)');
      ctx.lineWidth = i === 2 ? 1.9 : 3.0;
      ctx.shadowColor = i === 0 ? 'rgba(146,196,255,0.38)' : 'rgba(126,104,255,0.24)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      for (let a = 0; a <= Math.PI * 2.0; a += 0.18) {
        const spiral = 0.34 + a / (Math.PI * 2.1);
        const px = Math.cos(a) * rx * 0.6 * spiral;
        const py = Math.sin(a) * ry * 0.7 * spiral;
        if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.restore();
    }

    const core = ctx.createRadialGradient(-rx * 0.1, -ry * 0.12, 2, 0, 0, rx * 0.92);
    core.addColorStop(0, 'rgba(0,0,0,1)');
    core.addColorStop(0.45, 'rgba(3,3,9,0.99)');
    core.addColorStop(0.7, 'rgba(14,14,30,0.95)');
    core.addColorStop(1, 'rgba(120,176,255,0.24)');
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 0.92, ry * 0.9, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(200,228,255,0.72)';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx * 1.02, ry * 0.98, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (e0.t > 0.25) ctx.fillText('漩渦', 0, -ry - 12);
    ctx.restore();
  }


  function drawEnemyCar(car) {
    const x = laneX(car.lane, car.y);
    const e = roadEdgesAt(car.y);
    const fade = clamp((e.t - 0.02) / 0.18, 0, 1);
    if (fade <= 0.02) return;
    const y = roadSurfaceY(car.y, x);
    const scale = lerp(0.28, 1.02, e.t);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    ctx.globalAlpha = fade * 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 18, car.kind === 'truck' ? 34 : 30, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = fade;

    if (car.kind === 'truck') {
      const cabGrad = ctx.createLinearGradient(-32, -14, 30, 16);
      cabGrad.addColorStop(0, '#a9b4bf');
      cabGrad.addColorStop(0.55, car.color);
      cabGrad.addColorStop(1, '#495560');
      ctx.fillStyle = cabGrad;
      ctx.beginPath();
      ctx.roundRect(-34, -18, 68, 36, 9);
      ctx.fill();
      ctx.fillStyle = '#ddeeff';
      ctx.beginPath(); ctx.roundRect(-10, -14, 24, 12, 4); ctx.fill();
      ctx.fillStyle = '#d8dee5';
      ctx.beginPath(); ctx.roundRect(-30, -10, 20, 20, 5); ctx.fill();
      ctx.fillStyle = '#1d2329';
      ctx.fillRect(-8, -2, 16, 6);
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(-20, 18, 7, 0, Math.PI * 2);
      ctx.arc(20, 18, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffd55a';
      ctx.fillRect(-31, -3, 5, 5);
      ctx.fillRect(26, -3, 5, 5);
    } else {
      const bodyGrad = ctx.createLinearGradient(-26, -10, 26, 14);
      bodyGrad.addColorStop(0, '#7e8d9b');
      bodyGrad.addColorStop(0.55, car.color);
      bodyGrad.addColorStop(1, '#2f3943');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.roundRect(-28, -20, 56, 34, 10);
      ctx.fill();

      ctx.fillStyle = '#cfe8ff';
      ctx.beginPath(); ctx.roundRect(-18, -16, 36, 12, 5); ctx.fill();
      ctx.fillStyle = '#1d2329';
      ctx.fillRect(-10, -4, 20, 7);

      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(-17, 15, 7, 0, Math.PI * 2);
      ctx.arc(17, 15, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffd55a';
      ctx.fillRect(-26, -5, 5, 5);
      ctx.fillRect(21, -5, 5, 5);
    }
    ctx.restore();
  }

  function drawTruck(truck) {

    if (fade <= 0.02) return;
    const x = e.center + truck.laneNorm * e.width * 0.24;
    const y = roadSurfaceY(truck.y, x);
    const scale = lerp(0.24, 0.92, e.t);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    ctx.globalAlpha = fade * 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 18, 34, 9, 0, 0, Math.PI * 2);

    ctx.globalAlpha = fade;

    const boxGrad = ctx.createLinearGradient(-38, -24, 38, 20);
    boxGrad.addColorStop(0, '#eef2f6');
    boxGrad.addColorStop(0.6, truck.color);
    boxGrad.addColorStop(1, '#8e99a5');
    ctx.fillStyle = boxGrad;
    ctx.beginPath();
    ctx.roundRect(-36, -20, 72, 36, 10);

    ctx.fillStyle = '#6c7782';
    ctx.beginPath();
    ctx.roundRect(-16, -36, 32, 20, 8);
    ctx.fill();

    ctx.fillStyle = '#d7efff';
    ctx.beginPath();
    ctx.roundRect(-10, -32, 20, 10, 4);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-22, 18, 7, 0, Math.PI * 2);
    ctx.arc(22, 18, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffd45e';
    ctx.fillRect(-34, -6, 5, 5);
    ctx.fillRect(29, -6, 5, 5);
    ctx.restore();
  }

  function drawRider() {
    const y = roadSurfaceY(rider.y + Math.sin(rider.bob) * 1.2, rider.x);
    const x = rider.x;
    const scale = lerp(0.64, 0.84, clamp((rider.depth - 0.60) / 0.28, 0, 1));
    const roadState = roadEdgesAt(rider.y);
    const nearBank = roadState.bank;
    const moveLean = (rider.targetLane - rider.lane) * 6.4;
    const curveLean = rider.steer * (10 + Math.max(0, throttle) * 5.5);
    const bankLean = nearBank * 0.48;
    const lean = clamp((roadCenterAt(H * 0.56) - roadCenterAt(H * 0.82)) * 0.035 + moveLean + curveLean + bankLean, -14, 14);

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(lean * Math.PI / 180);
    ctx.scale(scale, scale);

    const flamePower = clamp(currentSpeedKmh / Math.max(1, maxPlayerSpeedKmh), 0.18, 1);
    const flamePulse = 0.82 + Math.sin(rider.bob * 2.1) * 0.18;

    // soft racing shadow and speed glow under the car
    ctx.globalAlpha = 0.26;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 38, 64, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#9fe7ff';
    for (let i = 0; i < 5; i++) {
      const tail = i * 17;
      ctx.beginPath();
      ctx.ellipse(-18 - tail, 35 + i * 2.1, 18 - i * 2.1, 4.8 - i * 0.42, -0.18, 0, Math.PI * 2);
      ctx.ellipse(20 - tail, 35 + i * 2.1, 16 - i * 1.9, 4.5 - i * 0.38, -0.18, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (rider.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,50,50,${rider.hitFlash * 0.55})`;
      ctx.beginPath();
      ctx.arc(0, -4, 64, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundedPath(points, radius = 8) {
      ctx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const n = points[(i + 1) % points.length];
        if (i === 0) ctx.moveTo(p[0], p[1]);
        ctx.lineTo(n[0], n[1]);
      }
      ctx.closePath();
    }

    function drawFlame(cx, cy, side, size) {
      const outer = ctx.createRadialGradient(cx, cy - 8 * size, 2, cx, cy + 18 * size, 34 * size);
      outer.addColorStop(0, 'rgba(255,255,230,0.98)');
      outer.addColorStop(0.24, 'rgba(255,222,60,0.95)');
      outer.addColorStop(0.55, 'rgba(255,104,12,0.82)');
      outer.addColorStop(1, 'rgba(255,70,0,0)');
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.moveTo(cx - side * 5 * size, cy - 1 * size);
      ctx.bezierCurveTo(cx - side * 24 * size, cy + 24 * size, cx - side * 8 * size, cy + 55 * size * flamePulse, cx, cy + 68 * size * flamePulse);
      ctx.bezierCurveTo(cx + side * 9 * size, cy + 52 * size * flamePulse, cx + side * 18 * size, cy + 22 * size, cx + side * 6 * size, cy - 1 * size);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,245,0.90)';
      ctx.beginPath();
      ctx.moveTo(cx - side * 2 * size, cy + 6 * size);
      ctx.bezierCurveTo(cx - side * 10 * size, cy + 25 * size, cx - side * 3 * size, cy + 42 * size * flamePulse, cx, cy + 50 * size * flamePulse);
      ctx.bezierCurveTo(cx + side * 5 * size, cy + 35 * size * flamePulse, cx + side * 7 * size, cy + 18 * size, cx + side * 3 * size, cy + 6 * size);
      ctx.closePath();
      ctx.fill();
    }

    // wide rear tires
    function drawRearTire(tx, ty, w, h) {
      const tireGrad = ctx.createLinearGradient(tx - w / 2, ty - h / 2, tx + w / 2, ty + h / 2);
      tireGrad.addColorStop(0, '#30343a');
      tireGrad.addColorStop(0.55, '#090b0e');
      tireGrad.addColorStop(1, '#1f2328');
      ctx.fillStyle = tireGrad;
      ctx.beginPath();
      ctx.roundRect(tx - w / 2, ty - h / 2, w, h, 9);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = -2; i <= 2; i++) {
        ctx.moveTo(tx - w / 2 + 7, ty + i * 7);
        ctx.lineTo(tx + w / 2 - 7, ty + i * 5);
      }
      ctx.stroke();
    }
    drawRearTire(-40, 19, 20, 40);
    drawRearTire(40, 19, 20, 40);

    // flaming exhaust, like the reference supercar
    if (currentSpeedKmh > 12 || buttonsHeld.up) {
      drawFlame(-35, 27, -1, 0.40 + flamePower * 0.10);
      drawFlame(35, 27, 1, 0.40 + flamePower * 0.10);
      ctx.globalAlpha = 0.30;
      drawFlame(-24, 29, -1, 0.30 + flamePower * 0.06);
      drawFlame(24, 29, 1, 0.30 + flamePower * 0.06);
      ctx.globalAlpha = 1;
    }

    // black lower diffuser and exhaust housings
    const diffuserGrad = ctx.createLinearGradient(-50, 12, 50, 34);
    diffuserGrad.addColorStop(0, '#050607');
    diffuserGrad.addColorStop(0.45, '#141820');
    diffuserGrad.addColorStop(1, '#050607');
    ctx.fillStyle = diffuserGrad;
    ctx.beginPath();
    ctx.moveTo(-50, 12);
    ctx.lineTo(50, 12);
    ctx.lineTo(44, 28);
    ctx.lineTo(12, 30);
    ctx.lineTo(0, 26);
    ctx.lineTo(-12, 30);
    ctx.lineTo(-44, 28);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.beginPath();
    ctx.roundRect(-40, 17, 20, 6, 3);
    ctx.roundRect(20, 17, 20, 6, 3);
    ctx.fill();
    ctx.fillStyle = '#0b0c0e';
    ctx.beginPath();
    ctx.roundRect(-42, 15, 24, 10, 4);
    ctx.roundRect(18, 15, 24, 10, 4);
    ctx.fill();

    // main blue car body: smaller and more rectangular
    const bodyGrad = ctx.createLinearGradient(-60, -34, 60, 22);
    bodyGrad.addColorStop(0, '#067bd2');
    bodyGrad.addColorStop(0.22, '#19c6ff');
    bodyGrad.addColorStop(0.56, '#03aef7');
    bodyGrad.addColorStop(0.84, '#046ec7');
    bodyGrad.addColorStop(1, '#01579f');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-56, 7);
    ctx.lineTo(-52, -16);
    ctx.lineTo(-42, -25);
    ctx.lineTo(-20, -31);
    ctx.lineTo(20, -31);
    ctx.lineTo(42, -25);
    ctx.lineTo(52, -16);
    ctx.lineTo(56, 7);
    ctx.lineTo(48, 18);
    ctx.lineTo(23, 21);
    ctx.lineTo(-23, 21);
    ctx.lineTo(-48, 18);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(0,54,118,0.68)';
    ctx.lineWidth = 2.4;
    ctx.stroke();

    // glossy highlights on body panels
    const gloss = ctx.createLinearGradient(-34, -30, 30, 2);
    gloss.addColorStop(0, 'rgba(255,255,255,0.30)');
    gloss.addColorStop(0.45, 'rgba(255,255,255,0.15)');
    gloss.addColorStop(1, 'rgba(255,255,255,0.04)');
    ctx.fillStyle = gloss;
    ctx.beginPath();
    ctx.moveTo(-32, -16);
    ctx.lineTo(-12, -27);
    ctx.lineTo(12, -27);
    ctx.lineTo(32, -16);
    ctx.lineTo(12, -20);
    ctx.lineTo(-12, -20);
    ctx.closePath();
    ctx.fill();

    // dark rear window with side vents
    const glassGrad = ctx.createLinearGradient(-24, -34, 24, -14);
    glassGrad.addColorStop(0, '#06101e');
    glassGrad.addColorStop(0.45, '#1e3154');
    glassGrad.addColorStop(1, '#05080d');
    ctx.fillStyle = glassGrad;
    ctx.beginPath();
    ctx.roundRect(-26, -32, 52, 15, 3);
    ctx.fill();
    ctx.strokeStyle = '#020408';
    ctx.lineWidth = 4.2;
    ctx.stroke();
    ctx.globalAlpha = 0.26;
    ctx.fillStyle = '#9fdcff';
    ctx.beginPath();
    ctx.ellipse(-7, -28, 16, 3.5, -0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(210,235,255,0.35)';
    ctx.lineWidth = 1.8;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(-39, -27 + i * 4);
      ctx.lineTo(-30, -25 + i * 3.7);
      ctx.moveTo(39, -27 + i * 4);
      ctx.lineTo(30, -25 + i * 3.7);
      ctx.stroke();
    }

    // rear bumper sculpting
    const bumperGrad = ctx.createLinearGradient(-50, -4, 50, 17);
    bumperGrad.addColorStop(0, '#0266bb');
    bumperGrad.addColorStop(0.52, '#06c4ff');
    bumperGrad.addColorStop(1, '#015aa7');
    ctx.fillStyle = bumperGrad;
    ctx.beginPath();
    ctx.moveTo(-50, -2);
    ctx.lineTo(-24, 0);
    ctx.lineTo(-15, 8);
    ctx.lineTo(15, 8);
    ctx.lineTo(24, 0);
    ctx.lineTo(50, -2);
    ctx.lineTo(45, 15);
    ctx.lineTo(20, 18);
    ctx.lineTo(-20, 18);
    ctx.lineTo(-45, 15);
    ctx.closePath();
    ctx.fill();

    // license plate recess, sensors and center light bar
    ctx.fillStyle = 'rgba(0,83,160,0.55)';
    ctx.beginPath();
    ctx.roundRect(-17, 3, 34, 15, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.3;
    ctx.stroke();
    ctx.fillStyle = '#041016';
    ctx.beginPath();
    ctx.arc(-21, 17, 1.7, 0, Math.PI * 2);
    ctx.arc(21, 17, 1.7, 0, Math.PI * 2);
    ctx.fill();

    // red taillights and slim center strip
    function drawTailLight(side) {
      const red = ctx.createLinearGradient(side * 18, -2, side * 54, 7);
      red.addColorStop(0, '#c40012');
      red.addColorStop(0.45, '#ff151a');
      red.addColorStop(0.72, '#ff5b19');
      red.addColorStop(1, '#7b0007');
      ctx.fillStyle = red;
      ctx.beginPath();
      ctx.moveTo(side * 18, -7);
      ctx.lineTo(side * 47, -9);
      ctx.lineTo(side * 54, -1);
      ctx.lineTo(side * 50, 7);
      ctx.lineTo(side * 22, 6);
      ctx.lineTo(side * 14, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,210,120,0.45)';
      ctx.lineWidth = 1.7;
      ctx.beginPath();
      ctx.moveTo(side * 27, -5);
      ctx.lineTo(side * 46, -4);
      ctx.stroke();
      ctx.globalAlpha = 0.30;
      ctx.fillStyle = '#ff2100';
      ctx.beginPath();
      ctx.ellipse(side * 36, 1, 18, 5, side * 0.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    drawTailLight(-1);
    drawTailLight(1);
    ctx.fillStyle = '#ff0716';
    ctx.beginPath();
    ctx.roundRect(-24, -9, 48, 4, 2);
    ctx.fill();
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#ffffff';
    for (let i = -4; i <= 4; i++) {
      ctx.beginPath();
