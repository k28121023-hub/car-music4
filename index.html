    }
    ctx.globalAlpha = 1;

    // black side air vents and rear diffuser fins
    function drawVent(side) {
      const ventGrad = ctx.createLinearGradient(side * 34, 5, side * 52, 20);
      ventGrad.addColorStop(0, '#050607');
      ventGrad.addColorStop(0.55, '#222832');
      ventGrad.addColorStop(1, '#030405');
      ctx.fillStyle = ventGrad;
      ctx.beginPath();
      ctx.moveTo(side * 32, 6);
      ctx.lineTo(side * 50, 7);
      ctx.lineTo(side * 47, 17);
      ctx.lineTo(side * 30, 16);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(side * 34, 9 + i * 3.5);
        ctx.lineTo(side * 47, 10 + i * 2.8);
        ctx.stroke();
      }
    }
    drawVent(-1);
    drawVent(1);

    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-37, -21);
    ctx.lineTo(-16, -10);
    ctx.moveTo(37, -21);
    ctx.lineTo(16, -10);
    ctx.moveTo(-46, 12);
    ctx.lineTo(-20, 18);
    ctx.lineTo(20, 18);
    ctx.lineTo(46, 12);
    ctx.stroke();

    // mirrors, matching the reference silhouette
    ctx.strokeStyle = '#07090d';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-42, -22);
    ctx.lineTo(-58, -25);
    ctx.moveTo(42, -22);
    ctx.lineTo(58, -25);
    ctx.stroke();
    const mirrorGrad = ctx.createLinearGradient(-66, -28, -54, -22);
    mirrorGrad.addColorStop(0, '#b8e5ff');
    mirrorGrad.addColorStop(1, '#1d5c98');
    ctx.fillStyle = mirrorGrad;
    ctx.beginPath();
    ctx.roundRect(-68, -29, 12, 9, 3);
    ctx.fill();
    const mirrorGradR = ctx.createLinearGradient(54, -28, 66, -22);
    mirrorGradR.addColorStop(0, '#1d5c98');
    mirrorGradR.addColorStop(1, '#b8e5ff');
    ctx.fillStyle = mirrorGradR;
    ctx.beginPath();
    ctx.roundRect(56, -29, 12, 9, 3);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = clamp(p.life, 0, 1);
      if (p.spark) {
        ctx.fillStyle = '#ffcc45';
        ctx.fillRect(p.x, p.y, p.size * 1.6, p.size * 0.45);
        ctx.fillStyle = '#fff2c2';
        ctx.fillRect(p.x + p.size * 0.5, p.y, p.size * 0.7, p.size * 0.25);
      } else {
        ctx.fillStyle = p.good ? '#ffd64a' : '#ff5d5d';
        ctx.fillRect(p.x, p.y, p.size, p.size * 0.55);
      }
    }
    ctx.globalAlpha = 1;
  }

  function shouldShowFinalRank() {
    // Show final rank only after the player has actually finished,
    // or at least one enemy has actually crossed the finish line.
    if (raceFinished) return true;
    return enemyCars.some(car => car.finished);
  }

function drawFinishLine() {
    const remainingDistance = Math.max(0, raceLength - playerProgress);
    if (remainingDistance > 100) return;

    // Keep the finish line flat on the road, but draw it lower and thicker
    // so it is actually visible before the player reaches it.
    const yNear = H * (horizonYFactor + 0.14);
    const yFar = yNear - Math.max(6, H * 0.018);

    const eNear = roadEdgesAt(yNear);
    const eFar = roadEdgesAt(yFar);
    if (eNear.t <= 0.06 || eFar.t <= 0.06) return;

    const leftNear = eNear.left;
    const rightNear = eNear.right;
    const leftFar = eFar.left;
    const rightFar = eFar.right;

    const cells = 14;
    for (let i = 0; i < cells; i++) {
      const t0 = i / cells;
      const t1 = (i + 1) / cells;

      const x0n = leftNear + (rightNear - leftNear) * t0;
      const x1n = leftNear + (rightNear - leftNear) * t1;
      const x0f = leftFar + (rightFar - leftFar) * t0;
      const x1f = leftFar + (rightFar - leftFar) * t1;

      const y0n = roadSurfaceY(yNear, (x0n + x1n) * 0.5);
      const y1n = roadSurfaceY(yNear, (x0n + x1n) * 0.5);
      const y0f = roadSurfaceY(yFar, (x0f + x1f) * 0.5);
      const y1f = roadSurfaceY(yFar, (x0f + x1f) * 0.5);

      ctx.beginPath();
      ctx.moveTo(x0f, y0f);
      ctx.lineTo(x1f, y1f);
      ctx.lineTo(x1n, y1n);
      ctx.lineTo(x0n, y0n);
      ctx.closePath();
      ctx.fillStyle = i % 2 === 0 ? '#ffffff' : '#111111';
      ctx.fill();
    }

    ctx.beginPath();
    ctx.moveTo(leftFar, roadSurfaceY(yFar, (leftFar + rightFar) * 0.5));
    ctx.lineTo(rightFar, roadSurfaceY(yFar, (leftFar + rightFar) * 0.5));
    ctx.lineTo(rightNear, roadSurfaceY(yNear, (leftNear + rightNear) * 0.5));
    ctx.lineTo(leftNear, roadSurfaceY(yNear, (leftNear + rightNear) * 0.5));
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    const pan = cameraPan();
    ctx.translate(W / 2 + pan, H * 0.56);
    ctx.rotate(cameraRoll());
    ctx.translate(-(W / 2 + pan), -H * 0.56);
    drawBackground();
    drawRoad();
    drawFinishLine();
    streetDeco.sort((a,b)=>a.y-b.y).forEach(drawStreetDeco);
    drawDelivery();
    enemyCars.sort((a,b)=>a.y-b.y).forEach(drawEnemyCar);
    drawRider();
    drawParticles();
    ctx.restore();
  }

  function loop(ts) {
    const dt = Math.min(0.024, (ts - last) / 1000 || 0.016);
    last = ts; update(dt); render(); requestAnimationFrame(loop);
  }

  function start() {
    ui.overlay.style.display = 'none';
    resetGame();
  }

  function press(handler, activeKey) {
    return e => { e.preventDefault(); if (activeKey) buttonsHeld[activeKey] = true; handler && handler(); };
  }
  function release(activeKey) {
    return e => { e.preventDefault(); if (activeKey) buttonsHeld[activeKey] = false; };
  }

  ui.overlay.addEventListener('click', e => { if (e.target && e.target.id === 'startBtn') start(); });
  ui.leftBtn.addEventListener('touchstart', press(()=>changeLane(-1)), { passive:false });
  ui.rightBtn.addEventListener('touchstart', press(()=>changeLane(1)), { passive:false });
  ui.upBtn.addEventListener('touchstart', press(null, 'up'), { passive:false });
  ui.downBtn.addEventListener('touchstart', press(null, 'down'), { passive:false });
  ui.leftBtn.addEventListener('touchend', release(), { passive:false });
  ui.rightBtn.addEventListener('touchend', release(), { passive:false });
  ui.upBtn.addEventListener('touchend', release('up'), { passive:false });
  ui.downBtn.addEventListener('touchend', release('down'), { passive:false });
  ui.leftBtn.addEventListener('touchcancel', release(), { passive:false });
  ui.rightBtn.addEventListener('touchcancel', release(), { passive:false });
  ui.upBtn.addEventListener('touchcancel', release('up'), { passive:false });
  ui.downBtn.addEventListener('touchcancel', release('down'), { passive:false });

  ui.leftBtn.addEventListener('mousedown', e => { e.preventDefault(); changeLane(-1); });
  ui.rightBtn.addEventListener('mousedown', e => { e.preventDefault(); changeLane(1); });
  ui.upBtn.addEventListener('mousedown', e => { e.preventDefault(); buttonsHeld.up = true; });
  ui.downBtn.addEventListener('mousedown', e => { e.preventDefault(); buttonsHeld.down = true; });
  ui.upBtn.addEventListener('mouseup', e => { e.preventDefault(); buttonsHeld.up = false; });
  ui.downBtn.addEventListener('mouseup', e => { e.preventDefault(); buttonsHeld.down = false; });
  ui.upBtn.addEventListener('mouseleave', e => { buttonsHeld.up = false; });
  ui.downBtn.addEventListener('mouseleave', e => { buttonsHeld.down = false; });
  window.addEventListener('mouseup', () => { buttonsHeld.up = false; buttonsHeld.down = false; });

  // Smooth mobile touch driving:
  // - Press and hold anywhere on the road/canvas to accelerate.
  // - Slide left/right: the car follows your finger smoothly.
  // - Slide downward: brake.
  // The visible arrow buttons are intentionally removed.
  const touchDrive = {
    active: false,
    pointerId: null,
    startX: 0,
    startY: 0,
    x: 0,
    y: 0,
    brakeThreshold: 76
  };

  function applyTouchDrive(x, y) {
    if (quizActive || gameOver || ui.overlay.style.display === 'flex') return;

    touchDrive.x = x;
    touchDrive.y = y;

    // Use lightweight screen-position mapping during pointer movement.
    // This avoids repeated heavy road calculations on mobile and reduces mid-game stutter.
    const screenCenter = W * 0.5;
    const safeHalf = Math.max(120, W * 0.42);
    const desiredLane = clamp((x - screenCenter) / safeHalf, -riderSideLimit, riderSideLimit);

    // Directly set the target lane from finger position.
    // update() already interpolates the actual car position, so this feels smooth.
    rider.targetLane = desiredLane;

    const downwardDrag = y - touchDrive.startY;
    if (downwardDrag > touchDrive.brakeThreshold) {
      buttonsHeld.down = true;
      buttonsHeld.up = false;
    } else {
      buttonsHeld.down = false;
      buttonsHeld.up = true;
    }
  }

  function beginTouchDrive(x, y, pointerId = null) {
    if (quizActive || gameOver || ui.overlay.style.display === 'flex') return;
    touchDrive.active = true;
    touchDrive.pointerId = pointerId;
    touchDrive.startX = x;
    touchDrive.startY = y;
    applyTouchDrive(x, y);
  }

  function endTouchDrive() {
    touchDrive.active = false;
    touchDrive.pointerId = null;
    buttonsHeld.up = false;
    buttonsHeld.down = false;
  }

  if (window.PointerEvent) {
    canvas.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
      beginTouchDrive(e.clientX, e.clientY, e.pointerId);
    }, { passive:false });

    canvas.addEventListener('pointermove', e => {
      if (!touchDrive.active) return;
      if (touchDrive.pointerId !== null && e.pointerId !== touchDrive.pointerId) return;
      e.preventDefault();
      applyTouchDrive(e.clientX, e.clientY);
    }, { passive:false });

    canvas.addEventListener('pointerup', e => {
      if (touchDrive.pointerId !== null && e.pointerId !== touchDrive.pointerId) return;
      e.preventDefault();
      endTouchDrive();
    }, { passive:false });

    canvas.addEventListener('pointercancel', e => {
      if (touchDrive.pointerId !== null && e.pointerId !== touchDrive.pointerId) return;
      e.preventDefault();
      endTouchDrive();
    }, { passive:false });

    canvas.addEventListener('lostpointercapture', endTouchDrive);
  } else {
    // Fallback for older mobile browsers.
    canvas.addEventListener('touchstart', e => {
      if (quizActive || gameOver || ui.overlay.style.display === 'flex') return;
      e.preventDefault();
      const t = e.changedTouches[0];
      if (t) beginTouchDrive(t.clientX, t.clientY);
    }, { passive:false });

    canvas.addEventListener('touchmove', e => {
      if (!touchDrive.active) return;
      e.preventDefault();
      const t = e.changedTouches[0];
      if (t) applyTouchDrive(t.clientX, t.clientY);
    }, { passive:false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      endTouchDrive();
    }, { passive:false });

    canvas.addEventListener('touchcancel', e => {
      e.preventDefault();
      endTouchDrive();
    }, { passive:false });

    canvas.addEventListener('mousedown', e => {
      if (quizActive || gameOver || ui.overlay.style.display === 'flex') return;
      e.preventDefault();
      beginTouchDrive(e.clientX, e.clientY);
    });

    canvas.addEventListener('mousemove', e => {
      if (!touchDrive.active) return;
      e.preventDefault();
      applyTouchDrive(e.clientX, e.clientY);
    });

    canvas.addEventListener('mouseup', e => {
      e.preventDefault();
      endTouchDrive();
    });

    canvas.addEventListener('mouseleave', endTouchDrive);
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') changeLane(-1);
    if (e.key === 'ArrowRight') changeLane(1);
    if (e.key === 'ArrowUp') buttonsHeld.up = true;
    if (e.key === 'ArrowDown') buttonsHeld.down = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp') buttonsHeld.up = false;
    if (e.key === 'ArrowDown') buttonsHeld.down = false;
  });
  window.addEventListener('blur', () => {
    buttonsHeld.up = false;
    buttonsHeld.down = false;
    if (typeof touchDrive !== 'undefined') {
      touchDrive.active = false;
      touchDrive.pointerId = null;
    }
  });

  resize(); resetGame(); render(); requestAnimationFrame(loop); window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
